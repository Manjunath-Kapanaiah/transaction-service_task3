name: Transaction Service CI/CD

on:
  repository_dispatch:
    types: [fraud-check]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [11, 17]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}

      - name: Mock Build & Test
        run: |
          echo "Running Transaction Service tests on Java ${{ matrix.java }} (mock)"
          sleep 2

      - name: Deploy to Staging (mock)
        run: |
          echo "Deploying Transaction Service to staging environment (mock)"
          sleep 1
        env:
          ENV: staging

      - name: Conditional Production Deployment
        if: ${{ github.event.client_payload.status == 'success' }}
        run: |
          echo "Deploying to Production (mock)"
          sleep 1
        env:
          ENV: production

      - name: Rollback if Failure
        if: failure()
        run: |
          echo "Transaction Service failed – triggering Fraud Detection rollback (mock)"
          curl -X POST -H "Authorization: Bearer ${{ secrets.FRAUD_JENKINS_TOKEN }}" \
          http://<JENKINS_MASTER>/job/FraudDetection/build?token=<token>
